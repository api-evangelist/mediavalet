description: >-
  FinOps view of MediaValet spend. MediaValet is an enterprise, subscription-based
  SaaS DAM billed by contract - typically an annual agreement scaled on users,
  storage volume, and enabled modules. The Open API is included in the platform
  subscription rather than metered separately, so API usage does not carry its own
  line-item charge; the cost drivers are seats, stored asset volume, and premium
  modules (for example Brand Portals, Creative Connect, or Video Intelligence).
  There is no public usage-based API pricing to meter, so cost management here is
  about right-sizing the subscription (users, storage, modules) rather than
  optimizing per-call spend.
notes: >-
  Per-unit list prices are not published; MediaValet is quote-based. Reconcile
  actual contract terms, storage tiers, and module fees with MediaValet during a
  costing exercise.
