meters:
- name: users
  description: Named users / seats licensed on the MediaValet platform.
  unit: users
  aggregation: max
  dimensions:
  - account
- name: storage_volume
  description: Volume of digital assets stored in the library.
  unit: bytes
  aggregation: max
  dimensions:
  - account
  - library
- name: modules
  description: Premium modules enabled on the subscription (Brand Portals, Video Intelligence, etc.).
  unit: modules
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Track licensed seats, stored asset volume, and enabled modules against the contracted subscription.
- name: Allocation
  description: Map libraries, brand portals, and user groups to internal teams so DAM cost maps to cost centers.
- name: Optimization
  description: Reclaim inactive seats, archive or purge stale assets to control storage, and enable only the modules in active use.
- name: Accountability
  description: Assign a DAM owner to review the annual subscription, storage growth, and module usage before renewal.
