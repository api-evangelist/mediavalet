aid: mediavalet
name: MediaValet
review:
  question: Does MediaValet expose a documented public WebSocket API?
  answer: false
  date: '2026-07-05'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. MediaValet's public Open API is
    request/response REST over HTTPS, fronted by Azure API Management at
    https://api.mediavalet.com. Its event-driven surface is delivered by
    Webhooks - MediaValet POSTs event notifications to a customer-configured
    HTTP endpoint - which is server-to-endpoint HTTP, not a WebSocket or SSE
    stream on MediaValet's own API. There is no server-push streaming transport
    on MediaValet's own API to model as AsyncAPI as of the review date.
findings:
  summary: |
    MediaValet does not publish a documented public WebSocket API. MediaValet is
    a cloud digital asset management (DAM) platform. Its Open API is a RESTful,
    JSON, hypermedia-driven interface at https://api.mediavalet.com, secured with
    OAuth 2.0 (OIDC) access tokens obtained from
    https://login.mediavalet.com/connect/token plus a per-account subscription
    key sent in the Ocp-Apim-Subscription-Key header. All documented operations -
    across Assets, Categories, Attributes, Keywords, Uploads, and Users - are
    HTTPS REST. MediaValet's event-driven capability is provided via Webhooks
    (outbound HTTP callbacks to a customer endpoint), not a bidirectional or
    streaming WebSocket (ws:// or wss://) endpoint. No realtime WebSocket surface
    is documented.
  accessModel: |
    Access requires a MediaValet subscription and Developer Portal registration.
    A developer signs in to the Developer Portal, subscribes to an API plan, and
    after approval receives a subscription key. Every call carries both an OAuth
    2.0 Bearer access token and the Ocp-Apim-Subscription-Key header. The API is
    fronted by Azure API Management, which enforces per-key throttling (HTTP 429).
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.mediavalet.com
      documented: true
      note: All Open API operations are request/response REST over HTTPS.
    - protocol: Webhook
      scheme: https
      documented: true
      note: MediaValet POSTs event notifications to a customer-configured HTTP endpoint. Outbound HTTP callback, not WebSocket.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented anywhere in MediaValet's Open API reference or Developer Portal as of the review date.
  endpointsConfirmedRest:
    - GET    https://api.mediavalet.com/search
    - GET    https://api.mediavalet.com/assets/{assetId}
    - PUT    https://api.mediavalet.com/assets/{assetId}
    - GET    https://api.mediavalet.com/assets/{assetId}/relatedassets
    - GET    https://api.mediavalet.com/assets/{assetId}/renditions
    - GET    https://api.mediavalet.com/assets/{assetId}/attributes
    - GET    https://api.mediavalet.com/assets/{assetId}/categories
    - GET    https://api.mediavalet.com/assets/{assetId}/keywords
    - POST   https://api.mediavalet.com/assets/{assetId}/keywords
    - DELETE https://api.mediavalet.com/assets/{assetId}/keyword/{keyword}
    - GET    https://api.mediavalet.com/assets/{assetId}/comments
    - GET    https://api.mediavalet.com/assets/{assetId}/history
    - GET    https://api.mediavalet.com/assets/{assetId}/videoIntelligence/status
    - GET    https://api.mediavalet.com/categories
    - POST   https://api.mediavalet.com/categories
    - GET    https://api.mediavalet.com/categories/{categoryId}
    - GET    https://api.mediavalet.com/categories/{categoryId}/assets
    - GET    https://api.mediavalet.com/categories/permissionSets
    - GET    https://api.mediavalet.com/attributes
