sources:
  - url: https://docs.mediavalet.com/
    type: Documentation
    note: MediaValet API reference; RESTful hypermedia service, OAuth 2.0 (OIDC) auth. No WebSocket mentioned.
  - url: https://developer.mediavalet.com/
    type: APIReference
    note: Developer Experience portal - sign up, subscribe to an API plan, receive a subscription key. REST endpoints and Webhooks.
  - url: https://www.mediavalet.com/product/open-api
    type: ProductPage
    note: Open API product page - RESTful JSON, Basic auth and OAuth 2, CRUD with pagination and webhooks. No WebSocket.
  - url: https://support.mediavalet.com/hc/en-us/articles/5550696271380-How-do-I-sign-up-to-use-the-MediaValet-API
    type: Support
    note: Sign-up flow - create Developer Portal account, subscribe to a plan, receive approval email and subscription key.
  - url: https://github.com/armstro-ca/mvsdk
    type: SourceCode
    note: Community Python SDK grounding resource paths (assets, categories, attributes, keywords, uploads, users, groups) and the connect/token OAuth flow. All REST.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists. MediaValet's own public API is
    request/response REST over HTTPS, and its event-driven delivery is via
    outbound Webhooks rather than a server-push stream on MediaValet's API. No
    AsyncAPI document was created because there is no WebSocket or SSE transport
    on MediaValet's own API to model.
