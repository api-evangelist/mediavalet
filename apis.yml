aid: mediavalet
url: https://raw.githubusercontent.com/api-evangelist/mediavalet/refs/heads/main/apis.yml
name: MediaValet
kind: company
description: MediaValet is a cloud-native digital asset management (DAM) platform, built
  on Microsoft Azure, for storing, organizing, sharing, and distributing an organization's
  images, videos, documents, and other brand and marketing assets. Its Open API is a
  RESTful, JSON, hypermedia-driven service (base https://api.mediavalet.com) secured with
  OAuth 2.0 plus a per-account subscription key, letting teams automate uploading,
  cataloging, searching, and governing assets, categories, attributes, keywords, and users.
